services:
    # Solace Broker configuration
    solace-broker:
        container_name: solace-broker
        image: solace/solace-pubsub-standard:latest
        volumes:
          - "solace-storage:/var/lib/solace"
        shm_size: 1g
        ulimits:
          core: -1
          nofile:
            soft: 2448
            hard: 1048576
        deploy:
          restart_policy:
            condition: on-failure
            max_attempts: 1
        ports:
          # Web transport
          - '8008:8008'
          # Web transport over TLS
          - '1443:1443'
          # SEMP over TLS
          - '1943:1943'
          # MQTT Default VPN
          - '1883:1883'
          # AMQP Default VPN over TLS
          - '5671:5671'
          # AMQP Default VPN
          - '5672:5672'
          # MQTT Default VPN over WebSockets / TLS
          - '8443:8443'
          # MQTT Default VPN over TLS
          - '8883:8883'
          # SEMP / PubSub+ Manager
          - '8080:8080'
          # REST Default VPN
          - '9000:9000'
          # REST Default VPN over TLS
          - '9443:9443'
          # SMF
          - '55554:55555'
          # SMF Compressed
          - '55003:55003'
          # SMF over TLS
          - '55443:55443'
          # SSH connection to CLI
          - '2222:2222'
        environment:
          - username_admin_globalaccesslevel=admin
          - username_admin_password=admin
          - system_scaling_maxconnectioncount=100
        networks:
          - sam-network

    # Solace Agent Mesh configuration
    solace-agent-mesh:
        image: solace/solace-agent-mesh:latest
        container_name: solace-agent-mesh
        user: root
        # entrypoint: /bin/bash
        stdin_open: true       # same as -it
        tty: true              # same as -it
        volumes:
        - ./configs:/app/configs
        - ./src:/app/src
        - ./.env:/app/.env
        - ./artifacts:/tmp/samv2
        # - enterprise-logs:/app  # Map the entire /app directory to enterprise-logs
        networks:
        - sam-network
        ports:
        - "0.0.0.0:8000:8000"        # expose container port 8000 as port 8000 on host IP 0.0.0.0
        depends_on:
          - solace-broker
        command:
          - run
          - /app/configs/agents/main_orchestrator.yaml
          - /app/configs/gateways/webui.yaml
    
volumes:
    solace-storage:

networks:
    sam-network:
        external: true          # reuse your existing network
